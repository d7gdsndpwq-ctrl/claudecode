85">order and focus to complexity.</text><g filter="url(#sft)"><rect x="760" y="140" width="650" height="440" rx="18" fill="#FFFFFF"/></g><text x="800" y="192" font-size="14" font-weight="700" letter-spacing="2" fill="#B0852E">EQUILIBRIUM</text><text x="800" y="216" font-size="15" fill="#22395E">Balanced judgement</text><circle cx="1364" cy="192" r="14" fill="#F6F8FB"/><text x="1364" y="197" text-anchor="middle" font-size="14" fill="#94A0B2">2</text><g transform="translate(804,248) scale(1.95)"><g opacity="0.96"><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#15233E" transform="rotate(-27 60 66)"/></g><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#C9A24B" transform="rotate(27 60 66)" opacity="0.95"/><circle cx="60" cy="68" r="4.2" fill="#C9A24B"/></g><rect x="1060" y="258" width="120" height="120" rx="20" fill="url(#navyG)"/><g transform="translate(1060,258) scale(1.0)"><g opacity="0.96"><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#9FB0CC" transform="rotate(-27 60 66)"/></g><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#E6CB7E" transform="rotate(27 60 66)" opacity="0.95"/><circle cx="60" cy="68" r="4.2" fill="#E6CB7E"/></g><rect x="1200" y="258" width="120" height="120" rx="20" fill="#F6F8FB" stroke="#E5E9F0"/><g transform="translate(1200,258) scale(1.0)"><g opacity="0.96"><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#171717" transform="rotate(-27 60 66)"/></g><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#7C7C7C" transform="rotate(27 60 66)" opacity="0.95"/><circle cx="60" cy="68" r="4.2" fill="#5A5A5A"/></g><g transform="translate(804,440) scale(0.62)"><g opacity="0.96"><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#15233E" transform="rotate(-27 60 66)"/></g><path d="M60,66 C48,48 48,30 60,18 C72,30 72,48 60,66 Z" fill="#C9A24B" transform="rotate(27 60 66)" opacity="0.95"/><circle cx="60" cy="68" r="4.2" fill="#C9A24B"/></g><text x="888" y="484" font-size="34" font-weight="600" fill="#15233E">Niyam</text><text x="891" y="506" font-size="11" letter-spacing="6" fill="#C9A24B">CONSULTING</text><text x="800" y="522" font-size="13.5" fill="#22395E" opacity="0.85">Two forms held in poise — sound judgement, weighing every</text><text x="800" y="542" font-size="13.5" fill="#22395E" opacity="0.85">side before advising.</text><g filter="url(#sft)"><rect x="70" y="620" width="650" height="440" rx="18" fill="#FFFFFF"/></g><text x="110" y="672" font-size="14" font-weight="700" letter-spacing="2" fill="#B0852E">ORDER</text><text x="110" y="696" font-size="15" fill="#22395E">Structure &amp; discipline</text><circle cx="674" cy="672" r="14" fill="#F6F8FB"/><text x="674" y="677" text-anchor="middle" font-size="14" fill="#94A0B2">3</text><g transform="translate(114,728) scale(1.95)"><rect x="20" y="20" width="80" height="80" rx="18" fill="none" stroke="#15233E" stroke-width="8"/><polygon points="60.00,34.00 86.00,60.00 60.00,86.00 34.00,60.00" fill="none" stroke="#C9A24B" stroke-width="6.5" stroke-linejoin="round"/><rect x="52" y="52" width="16" height="16" rx="3" fill="#C9A24B" transform="rotate(45 60 60)"/></g><rect x="370" y="738" width="120" height="120" rx="20" fill="url(#navyG)"/><g transform="translate(370,738) scale(1.0)"><rect x="20" y="20" width="80" height="80" rx="18" fill="none" stroke="#9FB0CC" stroke-width="8"/><polygon points="60.00,34.00 86.00,60.00 60.00,86.00 34.00,60.00" fill="none" stroke="#E6CB7E" stroke-width="6.5" stroke-linejoin="round"/><rect x="52" y="52" width="16" height="16" rx="3" fill="#E6CB7E" transform="rotate(45 60 60)"/></g><rect x="510" y="738" width="120" height="120" rx="20" fill="#F6F8FB" stroke="#E5E9F0"/><g transform="translate(510,738) scale(1.0)"><rect x="20" y="20" width="80" height="80" rx="18" fill="none" stroke="#171717" stroke-width="8"/><polygon points="60.00,34.00 86.00,60.00 60.00,86.00 34.00,60.00" fill="none" stroke="#7C7C7C" stroke-width="6.5" stroke-linejoin="round"/><rect x="52" y="52" width="16" height="16" rx="3" fill="#5A5A5A" transform="rotate(45 60 60)"/></g><g transform="translate(114,920) scale(0.62)"><rect x="20" y="20" width="80" height="80" rx="18" fill="none" stroke="#15233E" stroke-width="8"/><polygon points="60.00,34.00 86.00,60.00 60.00,86.00 34.00,60.00" fill="none" stroke="#C9A24B" stroke-width="6.5" stroke-linejoin="round"/><rect x="52" y="52" width="16" height="16" rx="3" fill="#C9A24B" transform="rotate(45 60 60)"/></g><text x="198" y="964" font-size="34" font-weight="600" fill="#15233E">Niyam</text><text x="201" y="986" font-size="11" letter-spacing="6" fill="#C9A24B">CONSULTING</text><text x="110" y="1002" font-size="13.5" fill="#22395E" opacity="0.85">Frame within frame — disciplined structure, the literal</text><text x="110" y="1022" font-size="13.5" fill="#22395E" opacity="0.85">sense of niyam: rule and order.</text><g filter="url(#sft)"><rect x="760" y="620" width="650" height="440" rx="18" fill="#FFFFFF"/></g><text x="800" y="672" font-size="14" font-weight="700" letter-spacing="2" fill="#B0852E">SHIROREKHA</text><text x="800" y="696" font-size="15" fill="#22395E">Sanskrit heritage</text><circle cx="1364" cy="672" r="14" fill="#F6F8FB"/><text x="1364" y="677" text-anchor="middle" font-size="14" fill="#94A0B2">4</text><g transform="translate(804,728) scale(1.95)"><rect x="24" y="26" width="72" height="8" rx="4" fill="#C9A24B"/><rect x="33" y="38" width="8" height="48" rx="4" fill="#15233E"/><rect x="79" y="38" width="8" height="34" rx="4" fill="#33527E"/><path d="M37,80 Q60,104 83,72" fill="none" stroke="#15233E" stroke-width="8" stroke-linecap="round"/><circle cx="60" cy="58" r="4.6" fill="#C9A24B"/></g><rect x="1060" y="738" width="120" height="120" rx="20" fill="url(#navyG)"/><g transform="translate(1060,738) scale(1.0)"><rect x="24" y="26" width="72" height="8" rx="4" fill="#E6CB7E"/><rect x="33" y="38" width="8" height="48" rx="4" fill="#9FB0CC"/><rect x="79" y="38" width="8" height="34" rx="4" fill