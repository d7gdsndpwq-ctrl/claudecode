<svg width="1480" height="1120" viewBox="0 0 1480 1120" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif"><defs><linearGradient id="navyG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22395E"/><stop offset="1" stop-color="#0E1A30"/></linearGradient><filter id="sft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0E1A30" flood-opacity="0.13"/></filter></defs><rect width="1480" height="1120" fill="#F6F8FB"/><text x="70" y="70" font-size="26" font-weight="600" fill="#15233E">Niyam Consulting — four less-expected directions</text><text x="70" y="98" font-size="15" fill="#94A0B2">Moving past the compass. Each mark is built from the meaning of “Niyam”: principle, order, discipline, judgement.</text><g filter="url(#sft)"><rect x="70" y="140" width="650" height="440" rx="18" fill="#FFFFFF"/></g><text x="110" y="192" font-size="14" font-weight="700" letter-spacing="2" fill="#B0852E">APERTURE</text><text x="110" y="216" font-size="15" fill="#22395E">Precision &amp; focus</text><circle cx="674" cy="192" r="14" fill="#F6F8FB"/><text x="674" y="197" text-anchor="middle" font-size="14" fill="#94A0B2">1</text><g transform="translate(114,248) scale(1.95)"><circle cx="60" cy="60" r="54" fill="none" stroke="#C9A24B" stroke-width="1.4" opacity="0.55"/><polygon points="60.00,14.00 100.00,54.00 60.00,54.00" fill="#33527E" /><polygon points="106.00,60.00 66.00,100.00 66.00,60.00" fill="#15233E" /><polygon points="60.00,106.00 20.00,66.00 60.00,66.00" fill="#33527E" /><polygon points="14.00,60.00 54.00,20.00 54.00,60.00" fill="#15233E" /><polygon points="60.00,53.00 67.00,60.00 60.00,67.00 53.00,60.00" fill="#C9A24B" /><circle cx="60" cy="60" r="2.4" fill="#C9A24B"/></g><rect x="370" y="258" width="120" height="120" rx="20" fill="url(#navyG)"/><g transform="translate(370,258) scale(1.0)"><circle cx="60" cy="60" r="54" fill="none" stroke="#E6CB7E" stroke-width="1.4" opacity="0.55"/><poly